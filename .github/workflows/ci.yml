name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  quality:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: stafflow_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      NODE_ENV: test
      CLIENT_URL: http://localhost:5173
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/stafflow_test
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/stafflow_test
      DEMO_MODE: "false"
      DEMO_UPLOADS_ENABLED: "false"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Verify canonical npm workspace
        run: npm run check:npm-workspace

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm exec -- prisma generate

      - name: Apply migrations
        run: npm run db:migrate:deploy

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

      - name: Smoke checks
        run: npm run smoke
