services:
  - type: web
    name: stafflow-api
    runtime: node
    plan: starter
    buildCommand: npm ci && npm exec -- prisma generate && npm run build:server
    startCommand: npm --prefix server start
    healthCheckPath: /health
    maxShutdownDelaySeconds: 10
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DEMO_MODE
        value: "true"
      - key: DEMO_UPLOADS_ENABLED
        value: "false"
      - key: PAYSLIP_MAX_UPLOAD_BYTES
        value: "2097152"
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
  - type: cron
    name: stafflow-auth-table-maintenance
    runtime: node
    plan: starter
    schedule: "17 3 * * *"
    buildCommand: npm ci && npm exec -- prisma generate
    startCommand: npm run db:maintain-auth
    envVars:
      - key: DATABASE_URL
        sync: false
  - type: cron
    name: stafflow-payslip-storage-maintenance
    runtime: node
    plan: starter
    schedule: "47 3 * * *"
    buildCommand: npm ci && npm exec -- prisma generate
    startCommand: npm run db:retry-payslip-deletes
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
